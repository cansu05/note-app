name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      VITE_FIREBASE_API_KEY: "dummy"
      VITE_FIREBASE_AUTH_DOMAIN: "dummy.firebaseapp.com"
      VITE_FIREBASE_DATABASE_URL: "https://dummy-default-rtdb.firebaseio.com"
      VITE_FIREBASE_PROJECT_ID: "dummy"
      VITE_FIREBASE_STORAGE_BUCKET: "dummy.appspot.com"
      VITE_FIREBASE_MESSAGING_SENDER_ID: "123456789"
      VITE_FIREBASE_APP_ID: "1:123456789:web:dummy"
      VITE_FIREBASE_MEASUREMENT_ID: "G-DUMMY"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: quality
    env:
      VITE_FIREBASE_API_KEY: "dummy"
      VITE_FIREBASE_AUTH_DOMAIN: "dummy.firebaseapp.com"
      VITE_FIREBASE_DATABASE_URL: "https://dummy-default-rtdb.firebaseio.com"
      VITE_FIREBASE_PROJECT_ID: "dummy"
      VITE_FIREBASE_STORAGE_BUCKET: "dummy.appspot.com"
      VITE_FIREBASE_MESSAGING_SENDER_ID: "123456789"
      VITE_FIREBASE_APP_ID: "1:123456789:web:dummy"
      VITE_FIREBASE_MEASUREMENT_ID: "G-DUMMY"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
